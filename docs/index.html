<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Awninglog</title>
<style>
  body { margin:0; background:#071414; color:#eee; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .wrap { max-width:640px; margin:0 auto; padding:64px 24px; text-align:center; }
  h1 { color:#26998c; font-size:2.2rem; }
  p { line-height:1.6; color:#ccc; }
  a { color:#26998c; }
  .badge { display:inline-block; padding:6px 14px; border:1px solid #26998c; border-radius:20px; color:#26998c; font-size:0.85rem; margin-bottom:20px; }
  footer { margin-top:48px; font-size:0.8rem; color:#777; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #26998c55 0%, #26998c00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
<div class="badge">Awninglog</div>
<h1>Awninglog</h1>
<p>Track awning and outdoor shade cleaning, retraction checks, and repairs.</p>
<p><strong>Free:</strong> Log awning maintenance with photo notes.<br><strong>Pro:</strong> Seasonal reminder schedule and motor-service history.</p>
<p><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a></p>

<footer>Contact: s0533495227@gmail.com</footer>
</div>
</body>
</html>
