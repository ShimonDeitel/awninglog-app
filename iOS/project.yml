name: Awninglog
options:
  bundleIdPrefix: com.shimondeitel.awninglog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Awninglog:
    type: application
    platform: iOS
    sources:
      - path: Awninglog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.awninglog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Awninglog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  AwninglogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AwninglogTests
      - path: Awninglog.storekit
    dependencies:
      - target: Awninglog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.awninglog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  AwninglogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AwninglogUITests
    dependencies:
      - target: Awninglog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.awninglog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Awninglog:
    build:
      targets:
        Awninglog: all
        AwninglogTests: [test]
        AwninglogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Awninglog.storekit
    test:
      config: Debug
      storeKitConfiguration: Awninglog.storekit
      targets:
        - AwninglogTests
        - AwninglogUITests
    archive:
      config: Release
